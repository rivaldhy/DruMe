<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pro Drum v15 - Full Features</title>
    <style>
        :root { --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom); }
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; -webkit-user-select: none; touch-action: none; }
        canvas { display: block; width: 100vw; height: 100vh; }
        
        #ui { 
            position: absolute; top: calc(10px + var(--safe-top)); left: 15px; 
            display: flex; gap: 8px; z-index: 100; 
        }
        
        button { 
            padding: 10px 16px; border-radius: 10px; border: 1px solid #444; 
            background: rgba(30, 30, 30, 0.9); color: white; font-weight: bold; 
            backdrop-filter: blur(5px); font-size: 12px;
        }
        button.active { background: #007AFF; border-color: #FFF; }
        
        #editModal {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1c1c1e; padding: 20px; border-radius: 20px; border: 1px solid #444;
            z-index: 200; width: 80%; max-width: 300px; max-height: 85vh; overflow-y: auto; color: white;
        }
        .field { margin-bottom: 12px; }
        label { display: block; font-size: 10px; color: #aaa; margin-bottom: 4px; text-transform: uppercase; }
        input[type="text"], input[type="number"], input[type="range"] { 
            width: 100%; box-sizing: border-box; background: #000; border: 1px solid #333; 
            color: white; padding: 10px; border-radius: 8px; font-size: 16px;
        }
        .switch-row { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 10px; border-radius: 8px; border: 1px solid #333; }
        .m-btns { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .btn-save { background: #007AFF; border: none; padding: 12px; color: white; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui">
        <button id="editBtn">PLAY MODE</button>
        <button id="addBtn" style="display:none;">+ PAD</button>
    </div>

    <div id="editModal">
        <h3 style="margin-top:0">Setelan Pad</h3>
        <div class="field"><label>Nama Pad</label><input type="text" id="pName"></div>
        <div class="field"><label>Mute Group (0 = Off)</label><input type="number" id="pGroup" min="0"></div>
        <div class="field"><label>Volume</label><input type="range" id="pVol" min="0" max="1" step="0.1"></div>
        <div class="field"><label>Pitch</label><input type="range" id="pPitch" min="0.5" max="2.0" step="0.1"></div>
        <div class="field">
            <div class="switch-row">
                <label style="margin:0">Velocity Sens</label>
                <input type="checkbox" id="pSens">
            </div>
        </div>
        <div class="field"><label>Warna</label><input type="color" id="pColor" style="width:100%; height:35px; border:none; background:none;"></div>
        <div class="field"><label>GANTI AUDIO (.wav, .mp3)</label><input type="file" id="pAudio" accept=".wav, .mp3"></div>
        
        <div class="m-btns">
            <button class="btn-save" id="btnSaveAction">SIMPAN</button>
            <button id="btnDeleteAction" style="background:#FF3B30; border:none; padding:10px; color:white; border-radius:8px;">HAPUS</button>
            <button id="btnCloseAction" style="background:none; border:none; color:#777;">BATAL</button>
        </div>
    </div>

    <canvas id="canvas"></canvas>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDd1_GfXEAubvEym0mYkXiz8SUZ35FtodY",
        authDomain: "databersama.firebaseapp.com",
        databaseURL: "https://databersama-default-rtdb.firebaseio.com",
        projectId: "databersama",
        storageBucket: "databersama.firebasestorage.app",
        messagingSenderId: "699549114383",
        appId: "1:699549114383:web:1719fedbdde88a2ddb437a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const drumRef = ref(db, 'drumLayout/global');

    window.saveToCloud = (data) => set(drumRef, data);

    onValue(drumRef, (snapshot) => {
        const data = snapshot.val();
        if (data) {
            window.pads = data;
            if (window.loadAudioFiles) window.loadAudioFiles();
        }
    });
</script>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let audioCtx, isEditMode = false, selectedPadIndex = null;
    window.pads = []; 
    let audioBuffers = {}, activeSources = {}, activeHits = {}, activeTouches = {};

    function getScreenPos(p) {
        return {
            x: p.rx * canvas.width, y: p.ry * canvas.height,
            w: p.rw * canvas.width, h: p.rh * canvas.height
        };
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);

    function init() {
        resize();
        window.pads = [
            { id: 1, name: 'KICK', rx: 0.1, ry: 0.6, rw: 0.25, rh: 0.25, color: '#FF3B30', volume: 1, pitch: 1, muteGroup: 0, useVelocity: true }
        ];
        render();
    }

    async function playSound(pad, velocity = 1.0) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (!audioBuffers[pad.id]) return;

        // Mute Group Logic
        if (pad.muteGroup > 0 && activeSources[pad.muteGroup]) {
            activeSources[pad.muteGroup].forEach(src => {
                src.gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
                setTimeout(() => src.node.stop(), 50);
            });
            activeSources[pad.muteGroup] = [];
        }

        const s = audioCtx.createBufferSource();
        const g = audioCtx.createGain();
        const v = pad.useVelocity ? velocity : 1.0;

        s.buffer = audioBuffers[pad.id];
        s.playbackRate.value = pad.pitch || 1.0;
        g.gain.value = (pad.volume || 1.0) * v;

        s.connect(g); g.connect(audioCtx.destination);
        s.start();

        if (pad.muteGroup > 0) {
            if (!activeSources[pad.muteGroup]) activeSources[pad.muteGroup] = [];
            activeSources[pad.muteGroup].push({ node: s, gain: g });
        }
    }

    function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        window.pads.forEach((p) => {
            const pos = getScreenPos(p);
            const isHit = activeHits[p.id];
            
            ctx.fillStyle = isHit ? p.color : (isEditMode ? '#222' : '#111');
            ctx.shadowBlur = isHit ? 30 : 0;
            ctx.shadowColor = p.color;
            
            ctx.beginPath();
            ctx.roundRect(pos.x, pos.y, pos.w, pos.h, 15);
            ctx.fill();
            
            ctx.shadowBlur = 0;
            ctx.strokeStyle = p.color;
            ctx.lineWidth = isEditMode ? 2 : 1;
            ctx.stroke();

            ctx.fillStyle = isHit ? '#000' : '#fff';
            ctx.font = `bold ${Math.min(pos.w/4, 16)}px sans-serif`;
            ctx.textAlign = 'center';
            ctx.fillText(p.name, pos.x + pos.w/2, pos.y + pos.h/2 + 5);

            if (isEditMode) {
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(pos.x + pos.w, pos.y + pos.h, 10, 0, Math.PI*2);
                ctx.fill();
            }
        });
        requestAnimationFrame(render);
    }

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        [...e.changedTouches].forEach(t => {
            const mx = t.clientX, my = t.clientY;
            window.pads.forEach((p, i) => {
                const pos = getScreenPos(p);
                if (isEditMode) {
                    if (Math.hypot(mx - (pos.x + pos.w), my - (pos.y + pos.h)) < 35) {
                        activeTouches[t.identifier] = { type: 'resize', index: i };
                    } else if (mx > pos.x && mx < pos.x + pos.w && my > pos.y && my < pos.y + pos.h) {
                        activeTouches[t.identifier] = { type: 'drag', index: i, ox: (mx - pos.x)/canvas.width, oy: (my - pos.y)/canvas.height };
                        const tid = t.identifier;
                        setTimeout(() => { if(activeTouches[tid]) openModal(i); }, 300);
                    }
                } else {
                    if (mx > pos.x && mx < pos.x + pos.w && my > pos.y && my < pos.y + pos.h) {
                        // Velocity calculation based on center hit
                        const distToCenter = Math.hypot(mx - (pos.x + pos.w/2), my - (pos.y + pos.h/2));
                        const maxDist = Math.hypot(pos.w/2, pos.h/2);
                        const vel = Math.max(0.2, 1.0 - (distToCenter / maxDist));

                        activeHits[p.id] = true;
                        playSound(p, vel);
                        setTimeout(() => delete activeHits[p.id], 100);
                    }
                }
            });
        });
    });

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        [...e.changedTouches].forEach(t => {
            const data = activeTouches[t.identifier];
            if (!data) return;
            const p = window.pads[data.index];
            if (data.type === 'resize') {
                p.rw = Math.max(0.05, (t.clientX - (p.rx * canvas.width)) / canvas.width);
                p.rh = Math.max(0.05, (t.clientY - (p.ry * canvas.height)) / canvas.height);
            } else if (data.type === 'drag') {
                p.rx = (t.clientX / canvas.width) - data.ox;
                p.ry = (t.clientY / canvas.height) - data.oy;
            }
        });
    });

    canvas.addEventListener('touchend', (e) => {
        [...e.changedTouches].forEach(t => delete activeTouches[t.identifier]);
        if (isEditMode) sync();
    });

    function openModal(i) {
        selectedPadIndex = i;
        const p = window.pads[i];
        document.getElementById('pName').value = p.name;
        document.getElementById('pGroup').value = p.muteGroup || 0;
        document.getElementById('pVol').value = p.volume || 1.0;
        document.getElementById('pPitch').value = p.pitch || 1.0;
        document.getElementById('pSens').checked = p.useVelocity !== false;
        document.getElementById('pColor').value = p.color;
        document.getElementById('pAudio').value = "";
        document.getElementById('editModal').style.display = 'block';
    }

    document.getElementById('btnSaveAction').onclick = async () => {
        let p = window.pads[selectedPadIndex];
        p.name = document.getElementById('pName').value;
        p.muteGroup = parseInt(document.getElementById('pGroup').value) || 0;
        p.volume = parseFloat(document.getElementById('pVol').value);
        p.pitch = parseFloat(document.getElementById('pPitch').value);
        p.useVelocity = document.getElementById('pSens').checked;
        p.color = document.getElementById('pColor').value;
        
        const file = document.getElementById('pAudio').files[0];
        if (file) {
            const ext = file.name.split('.').pop().toLowerCase();
            if(ext !== 'wav' && ext !== 'mp3') { alert("Gunakan .wav atau .mp3"); return; }
            const buffer = await file.arrayBuffer();
            audioBuffers[p.id] = await (audioCtx || new AudioContext()).decodeAudioData(buffer);
        }
        sync();
        document.getElementById('editModal').style.display = 'none';
    };

    function sync() {
        if (window.saveToCloud) window.saveToCloud(window.pads);
        localStorage.setItem('drumV15_local', JSON.stringify(window.pads));
    }

    document.getElementById('editBtn').onclick = (e) => {
        isEditMode = !isEditMode;
        e.target.innerText = isEditMode ? 'SAVE & PLAY' : 'PLAY MODE';
        e.target.classList.toggle('active');
        document.getElementById('addBtn').style.display = isEditMode ? 'block' : 'none';
    };

    document.getElementById('addBtn').onclick = () => {
        window.pads.push({ id: Date.now(), name: 'NEW', rx: 0.4, ry: 0.4, rw: 0.15, rh: 0.15, color: '#007AFF', volume: 1, pitch: 1, muteGroup: 0, useVelocity: true });
        sync();
    };

    document.getElementById('btnCloseAction').onclick = () => document.getElementById('editModal').style.display = 'none';
    document.getElementById('btnDeleteAction').onclick = () => { window.pads.splice(selectedPadIndex, 1); sync(); document.getElementById('editModal').style.display = 'none'; };

    init();
</script>
</body>
</html>
