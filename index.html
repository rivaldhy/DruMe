<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Pro Drum v15 - Pitch Tuning & Audio Persistent</title>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; font-family: -apple-system, sans-serif; -webkit-user-select: none; color: white; }
        /* Tambahkan ke dalam tag <style> */
   	  canvas { filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }
		  .active-glow { transition: opacity 0.1s ease-out; }

        #ui { position: absolute; top: 30px; left: 20px; display: flex; gap: 10px; z-index: 100; }
        button { 
            padding: 14px 20px; border-radius: 12px; border: 1px solid #333; 
            background: rgba(26, 26, 26, 0.8); color: white; font-weight: bold; 
            backdrop-filter: blur(10px);
        }
        button.active { background: #007AFF; border-color: #5AC8FA; }
        #editModal {
            display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1c1c1e; padding: 25px; border-radius: 24px; border: 1px solid #333;
            z-index: 200; width: 300px; box-shadow: 0 0 100px rgba(0,0,0,1);
            max-height: 80vh; overflow-y: auto;
        }
        .field { margin-bottom: 12px; }
        label { display: block; font-size: 11px; color: #888; margin-bottom: 4px; text-transform: uppercase; }
        input[type="text"], input[type="range"], input[type="number"] { 
            width: 100%; box-sizing: border-box; background: #000; border: 1px solid #333; 
            color: white; padding: 10px; border-radius: 10px; 
        }
        .switch-row { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 10px; border-radius: 10px; border: 1px solid #333; }
        .m-btns { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .btn-save { background: #007AFF; border: none; padding: 12px; font-weight: bold; color: white; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="ui">
        <button id="editBtn">MODE: PLAY</button>
        <button id="addBtn" style="display:none;">+ TAMBAH PAD</button>
    </div>

    <div id="editModal">
        <h3 style="margin:0 0 15px 0">Edit Pad</h3>
        <div class="field"><label>Nama Pad</label><input type="text" id="pName"></div>
        <div class="field"><label>Mute Group</label><input type="number" id="pGroup" min="0"></div>
        <div class="field"><label>Volume</label><input type="range" id="pVol" min="0" max="1" step="0.01"></div>
        <div class="field"><label id="pitchLabel">Pitch Tuning (1.0)</label><input type="range" id="pPitch" min="0.5" max="2.0" step="0.01"></div>
        
        <div class="field">
            <div class="switch-row">
                <label style="margin:0">Velocity (On/Off)</label>
                <input type="checkbox" id="pSens" style="width:20px; height:20px;">
            </div>
        </div>
        <div class="field"><label>Warna</label><input type="color" id="pColor" style="width:100%; height:40px; background:none; border:none;"></div>
        <div class="field"><label>Audio</label><input type="file" id="pAudio" accept=".wav, .mp3"></div>
        <div class="m-btns">
            <button class="btn-save" onclick="savePad()">Simpan</button>
            <button onclick="deletePad()" style="background:#FF3B30; border:none; padding:10px; color:white; border-radius:10px;">Hapus</button>
            <button onclick="closeModal()" style="background:none; border:none; color:#555">Batal</button>
        </div>
    </div>

    <canvas id="canvas"></canvas>

<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-analytics.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  // For Firebase JS SDK v7.20.0 and later, measurementId is optional
  const firebaseConfig = {
    apiKey: "AIzaSyDd1_GfXEAubvEym0mYkXiz8SUZ35FtodY",
    authDomain: "databersama.firebaseapp.com",
    databaseURL: "https://databersama-default-rtdb.firebaseio.com",
    projectId: "databersama",
    storageBucket: "databersama.firebasestorage.app",
    messagingSenderId: "699549114383",
    appId: "1:699549114383:web:1719fedbdde88a2ddb437a",
    measurementId: "G-XF3PX0RPQ2"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const analytics = getAnalytics(app);
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let audioCtx, isEditMode = false, pads = [], audioBuffers = {}, activeSources = {}, activeHits = {};
    let activeTouches = {}; 
    const GRID = 20;

    const dbName = "DrumAudioDB";
    const storeName = "samples";

    function openDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(dbName, 1);
            request.onupgradeneeded = () => request.result.createObjectStore(storeName);
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }

    async function saveAudioFile(id, arrayBuffer) {
        const db = await openDB();
        const tx = db.transaction(storeName, "readwrite");
        tx.objectStore(storeName).put(arrayBuffer, id);
    }

    async function loadAudioFiles() {
        const db = await openDB();
        const tx = db.transaction(storeName, "readonly");
        const store = tx.objectStore(storeName);
        
        for (let p of pads) {
            const request = store.get(p.id);
            request.onsuccess = async () => {
                if (request.result) {
                    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    audioBuffers[p.id] = await audioCtx.decodeAudioData(request.result.slice(0));
                }
            };
        }
    }

    function init() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const saved = localStorage.getItem('drumSetupV15');
        pads = saved ? JSON.parse(saved) : [
            { id: Date.now(), name: 'KICK', x: 100, y: 100, w: 200, h: 200, color: '#ffb3ba', volume: 1.0, muteGroup: 0, useVelocity: true, pitch: 1.0 }
        ];
        loadAudioFiles();
        render();
    }

    const snap = (v) => Math.round(v / GRID) * GRID;

    async function playSound(pad, vel) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();

        if (pad.muteGroup > 0 && activeSources[pad.muteGroup]) {
            activeSources[pad.muteGroup].forEach(s => {
                s.g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
                s.s.stop(audioCtx.currentTime + 0.03);
            });
            activeSources[pad.muteGroup] = [];
        }

        const g = audioCtx.createGain();
        const finalVel = (pad.useVelocity !== false) ? vel : 1.0;
        g.gain.setValueAtTime(pad.volume * finalVel * 0.8, audioCtx.currentTime);
        g.connect(audioCtx.destination);

        if (audioBuffers[pad.id]) {
            const s = audioCtx.createBufferSource();
            s.buffer = audioBuffers[pad.id];
            // TERAPKAN PITCH TUNING DISINI
            s.playbackRate.value = pad.pitch || 1.0; 
            s.connect(g); s.start();
            if (pad.muteGroup > 0) {
                if (!activeSources[pad.muteGroup]) activeSources[pad.muteGroup] = [];
                activeSources[pad.muteGroup].push({ s, g });
            }
        } else {
            const o = audioCtx.createOscillator();
            o.frequency.setValueAtTime(60 * (pad.pitch || 1.0), audioCtx.currentTime);
            o.connect(g); o.start(); o.stop(audioCtx.currentTime + 0.1);
        }
    }

    function render() {
        ctx.fillStyle = '#050505';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        pads.forEach(p => {
            const hit = activeHits[p.id];
            if (hit && !isEditMode) { ctx.shadowBlur = 40; ctx.shadowColor = p.color; }
            ctx.fillStyle = hit && !isEditMode ? p.color : (isEditMode ? '#1a1a1c' : '#111');
            ctx.beginPath(); ctx.roundRect(p.x, p.y, p.w, p.h, 20); ctx.fill();
            ctx.shadowBlur = 0; ctx.strokeStyle = p.color; ctx.lineWidth = isEditMode ? 2 : 1;
            ctx.globalAlpha = isEditMode ? 1.0 : 0.2; ctx.stroke(); ctx.globalAlpha = 1.0;
            ctx.fillStyle = hit && !isEditMode ? '#000' : 'white'; ctx.textAlign = 'center';
            ctx.font = 'bold 15px sans-serif'; ctx.fillText(p.name, p.x + p.w/2, p.y + p.h/2 + 5);
            if (isEditMode) {
                ctx.fillStyle = p.color; ctx.beginPath();
                ctx.arc(p.x + p.w, p.y + p.h, 12, 0, Math.PI*2); ctx.fill();
                ctx.font = '9px monospace';
                ctx.fillText(`PITCH: ${p.pitch || 1.0}`, p.x + p.w/2, p.y + p.h - 10);
            }
        });
        requestAnimationFrame(render);
    }

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        for (let i = 0; i < e.changedTouches.length; i++) {
            const t = e.changedTouches[i];
            const mx = t.clientX, my = t.clientY;

            for (let j = pads.length - 1; j >= 0; j--) {
                const p = pads[j];
                if (isEditMode) {
                    if (Math.hypot(mx - (p.x + p.w), my - (p.y + p.h)) < 40) {
                        activeTouches[t.identifier] = { type: 'resize', index: j, sw: p.w, sh: p.h, sx: mx, sy: my };
                        break; 
                    }
                    if (mx > p.x && mx < p.x + p.w && my > p.y && my < p.y + p.h) {
                        activeTouches[t.identifier] = { type: 'drag', index: j, ox: mx - p.x, oy: my - p.y, moved: false };
                        const tid = t.identifier;
                        setTimeout(() => { 
                            if(activeTouches[tid] && !activeTouches[tid].moved) openModal(j); 
                        }, 250);
                        break;
                    }
                } else {
                    if (mx > p.x && mx < p.x + p.w && my > p.y && my < p.y + p.h) {
                        const dX = Math.abs(mx - (p.x + p.w/2)) / (p.w/2);
                        const dY = Math.abs(my - (p.y + p.h/2)) / (p.h/2);
                        const vel = Math.max(0.1, 1.0 - Math.max(dX, dY));
                        activeHits[p.id] = true;
                        setTimeout(() => delete activeHits[p.id], 100);
                        playSound(p, vel);
                        break; 
                    }
                }
            }
        }
    }, {passive: false});

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        for (let i = 0; i < e.changedTouches.length; i++) {
            const t = e.changedTouches[i];
            const data = activeTouches[t.identifier];
            if (!data) continue;
            const p = pads[data.index];
            if (data.type === 'resize') {
                p.w = snap(Math.max(80, data.sw + (t.clientX - data.sx)));
                p.h = snap(Math.max(80, data.sh + (t.clientY - data.sy)));
            } else if (data.type === 'drag') {
                data.moved = true;
                p.x = snap(t.clientX - data.ox);
                p.y = snap(t.clientY - data.oy);
            }
        }
    }, {passive: false});

    canvas.addEventListener('touchend', (e) => {
        for (let i = 0; i < e.changedTouches.length; i++) {
            delete activeTouches[e.changedTouches[i].identifier];
        }
        if(isEditMode) saveData();
    });

    function openModal(idx) {
        let p = pads[idx]; selectedPadIndex = idx;
        document.getElementById('pName').value = p.name;
        document.getElementById('pGroup').value = p.muteGroup;
        document.getElementById('pVol').value = p.volume;
        document.getElementById('pPitch').value = p.pitch || 1.0;
        document.getElementById('pitchLabel').innerText = `Pitch Tuning (${p.pitch || 1.0})`;
        document.getElementById('pColor').value = p.color;
        document.getElementById('pSens').checked = p.useVelocity !== false;
        document.getElementById('editModal').style.display = 'block';
    }

    // Update label pitch saat slider digeser
    document.getElementById('pPitch').oninput = function() {
        document.getElementById('pitchLabel').innerText = `Pitch Tuning (${this.value})`;
    };

    async function savePad() {
        let p = pads[selectedPadIndex];
        p.name = document.getElementById('pName').value;
        p.muteGroup = parseInt(document.getElementById('pGroup').value) || 0;
        p.volume = parseFloat(document.getElementById('pVol').value);
        p.pitch = parseFloat(document.getElementById('pPitch').value);
        p.color = document.getElementById('pColor').value;
        p.useVelocity = document.getElementById('pSens').checked;
        
        const file = document.getElementById('pAudio').files[0];
        if (file) {
            const b = await file.arrayBuffer();
            await saveAudioFile(p.id, b);
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            audioBuffers[p.id] = await audioCtx.decodeAudioData(b.slice(0));
        }
        saveData(); closeModal();
    }

    function closeModal() { document.getElementById('editModal').style.display = 'none'; }
    function deletePad() { pads.splice(selectedPadIndex, 1); saveData(); closeModal(); }
    function saveData() { localStorage.setItem('drumSetupV15', JSON.stringify(pads)); }
    
    document.getElementById('editBtn').onclick = (e) => {
        isEditMode = !isEditMode;
        e.target.innerText = isEditMode ? 'SIMPAN' : 'MODE: PLAY';
        e.target.classList.toggle('active');
        document.getElementById('addBtn').style.display = isEditMode ? 'block' : 'none';
    };

    document.getElementById('addBtn').onclick = () => {
        pads.push({ id: Date.now(), name: 'NEW', x: 50, y: 50, w: 150, h: 150, color: '#bae1ff', volume: 1.0, muteGroup: 0, useVelocity: true, pitch: 1.0 });
    };

    init();
</script>
</body>
</html>
