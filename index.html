<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Pitch Master Pro | Professional UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.4);
            --accent: #f43f5e;
            --bg: #020617;
            --card: rgba(15, 23, 42, 0.75);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
        }

        /* Lock Screen & Reset */
        html, body {
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            touch-action: none;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
        }

        body { 
            background: radial-gradient(circle at 0% 0%, #1e1b4b 0%, #020617 100%);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        .glass-card { 
            background: var(--card);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 2.5rem;
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            width: 88%;
            max-width: 440px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            position: relative;
            max-height: 85vh;
            overflow-y: auto;
        }

        .screen { display: none; animation: fadeIn 0.4s ease-out; }
        .screen.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        h1 { 
            font-size: 2.2rem; font-weight: 800; margin-bottom: 0.5rem; 
            background: linear-gradient(135deg, #fff 0%, #818cf8 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
        }

        .subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; display: block; }

        .mode-btn {
            width: 100%; padding: 16px; margin: 10px 0; border-radius: 18px; 
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.03); color: white; cursor: pointer; 
            font-weight: 600; transition: all 0.3s; font-size: 0.95rem;
        }

        .mode-btn:hover { background: var(--primary); box-shadow: 0 0 15px var(--primary-glow); }

        .level-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 20px 0; }

        .wave-container {
            width: 100%; height: 160px; background: #000; border-radius: 24px;
            position: relative; margin: 20px 0; border: 1px solid rgba(99, 102, 241, 0.3);
            overflow: hidden; touch-action: none;
        }

        .timer-container { width: 100%; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; margin: 10px 0; overflow: hidden; }
        #timerBar { width: 100%; height: 100%; background: var(--accent); transition: width 1s linear; }

        .action-btn { 
            width: 100%; padding: 18px; border: none; border-radius: 18px; 
            font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 1rem;
        }
        .btn-play { background: #fff; color: #000; }
        .btn-check { background: var(--success); color: white; display: none; }

        input { 
            background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); 
            color: white; padding: 14px; border-radius: 14px; width: 100%; box-sizing: border-box; font-size: 16px;
        }
        
        .rank-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<div class="glass-card">
    <div id="lobby" class="screen active">
        <h1>Pitch Master</h1>
        <span class="subtitle">Asah pendengaran musikmu</span>
        <div style="margin-bottom: 20px; text-align: left;">
            <label style="font-size: 0.7rem; font-weight: 800; color: var(--primary); margin-left: 10px;">IDENTITY</label>
            <input type="text" id="playerNameInput" placeholder="Nama kamu...">
        </div>
        <button class="mode-btn" id="btnShowLevel">🎯 LEVEL MODE</button>
        <button class="mode-btn" id="btnSoloFree">👤 SOLO FREEPLAY</button>
        <button class="mode-btn" id="btnMultiplayer">👥 BATTLE MODE</button>
        
        <div id="multi-setup" style="display:none; margin-top: 20px;">
            <input type="number" id="playerCount" min="2" max="5" value="2" style="margin-bottom:10px;">
            <div id="playerNamesContainer"></div>
            <button class="action-btn btn-play" id="btnStartBattle">MULAI BATTLE</button>
        </div>
    </div>

    <div id="level-screen" class="screen">
        <h2>Pilih Level</h2>
        <div id="level-grid" class="level-grid"></div>
        <button class="mode-btn" id="btnBackLobby">KEMBALI</button>
    </div>

    <div id="game-screen" class="screen">
        <div id="activePlayerName" style="font-weight: 800; color: var(--primary);">PLAYER</div>
        <div id="timeLeftDisplay" style="font-size: 1.5rem; font-weight: 800; color: var(--accent);">15s</div>
        <div class="timer-container"><div id="timerBar"></div></div>
        <div class="wave-container" id="waveBox"><canvas id="canvas"></canvas></div>
        <p id="gameMsg">Dengarkan nada target...</p>
        <button class="action-btn btn-play" id="btnStartTurn">START TURN</button>
        <button class="action-btn btn-check" id="btnCheck">VALIDASI!</button>
    </div>

    <div id="results" class="screen">
        <h2>Selesai!</h2>
        <div id="leaderboard"></div>
        <button class="action-btn btn-play" onclick="location.reload()" style="margin-top:20px">MENU UTAMA</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // Konfigurasi Firebase (Gunakan milik Anda)
    const firebaseConfig = {
        apiKey: "AIzaSyDd1_GfXEAubvEym0mYkXiz8SUZ35FtodY",
        databaseURL: "https://databersama-default-rtdb.firebaseio.com",
        projectId: "databersama",
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const LEVELS = [
        { id: 1, range: [300, 450], time: 20 },
        { id: 2, range: [250, 550], time: 15 },
        { id: 3, range: [200, 700], time: 12 }
    ];

    let audioCtx, oscillator, mainGain;
    let gameState = { mode: 'solo', currentLevelIdx: 0, players: [], currentPlayerIdx: 0, targetFreq: 0, currentFreq: 440, timeLeft: 15, isPlaying: false };

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let isTouching = false;

    // --- UI NAVIGATION ---
    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    // --- GAME ENGINE ---
    function initGame(mode, levelIdx = 0) {
        gameState.mode = mode;
        gameState.currentLevelIdx = levelIdx;
        
        if (mode === 'multi') {
            const inputs = document.querySelectorAll('.multi-player-name');
            gameState.players = Array.from(inputs).map(inp => ({ name: inp.value || "Player", score: 0 }));
        } else {
            gameState.players = [{ name: document.getElementById('playerNameInput').value || "Guest", score: 0 }];
        }
        
        gameState.currentPlayerIdx = 0;
        switchScreen('game-screen');
        prepareTurn();
    }

    function prepareTurn() {
        gameState.isPlaying = false;
        document.getElementById('activePlayerName').innerText = gameState.players[gameState.currentPlayerIdx].name;
        document.getElementById('btnStartTurn').style.display = 'block';
        document.getElementById('btnCheck').style.display = 'none';
        document.getElementById('gameMsg').innerText = "Klik Start untuk mendengar nada target";
    }

    function startTurn() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // Setup Oscillator utama (User)
        if (oscillator) oscillator.stop();
        oscillator = audioCtx.createOscillator();
        mainGain = audioCtx.createGain();
        oscillator.connect(mainGain);
        mainGain.connect(audioCtx.destination);
        mainGain.gain.value = 0;
        oscillator.start();

        // Tentukan Target
        const range = gameState.mode === 'level' ? LEVELS[gameState.currentLevelIdx].range : [200, 800];
        gameState.targetFreq = Math.floor(Math.random() * (range[1] - range[0])) + range[0];
        
        // Mainkan nada target sebentar
        const tOsc = audioCtx.createOscillator();
        const tGain = audioCtx.createGain();
        tOsc.frequency.value = gameState.targetFreq;
        tOsc.connect(tGain); tGain.connect(audioCtx.destination);
        tGain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        tGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);
        tOsc.start(); tOsc.stop(audioCtx.currentTime + 1.6);

        gameState.isPlaying = true;
        gameState.timeLeft = gameState.mode === 'level' ? LEVELS[gameState.currentLevelIdx].time : 15;
        
        document.getElementById('btnStartTurn').style.display = 'none';
        document.getElementById('btnCheck').style.display = 'block';
        document.getElementById('gameMsg').innerText = "Cari nadanya!";

        const timer = setInterval(() => {
            gameState.timeLeft--;
            document.getElementById('timeLeftDisplay').innerText = gameState.timeLeft + "s";
            document.getElementById('timerBar').style.width = (gameState.timeLeft / 15 * 100) + "%";
            if (gameState.timeLeft <= 0 || !gameState.isPlaying) {
                clearInterval(timer);
                if (gameState.isPlaying) validatePitch();
            }
        }, 1000);
    }

    function validatePitch() {
        gameState.isPlaying = false;
        mainGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
        
        const diff = Math.abs(gameState.currentFreq - gameState.targetFreq);
        const accuracy = Math.max(0, Math.round(100 - (diff / 2)));
        
        gameState.players[gameState.currentPlayerIdx].score = accuracy;
        
        // Simpan ke Firebase
        push(ref(db, 'scores/'), {
            name: gameState.players[gameState.currentPlayerIdx].name,
            score: accuracy,
            mode: gameState.mode,
            date: new Date().toISOString()
        });

        alert(`Akurasi: ${accuracy}%`);

        if (gameState.currentPlayerIdx < gameState.players.length - 1) {
            gameState.currentPlayerIdx++;
            prepareTurn();
        } else {
            showResults();
        }
    }

    function showResults() {
        switchScreen('results');
        const board = document.getElementById('leaderboard');
        board.innerHTML = gameState.players
            .sort((a,b) => b.score - a.score)
            .map((p, i) => `<div class="rank-item"><span>#${i+1} ${p.name}</span><span>${p.score}%</span></div>`)
            .join('');
    }

    // --- RENDER VISUALIZER ---
    function render() {
        canvas.width = canvas.clientWidth;
        canvas.height = canvas.clientHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.beginPath();
        ctx.lineWidth = isTouching ? 4 : 2;
        ctx.strokeStyle = isTouching ? '#6366f1' : '#1e293b';
        
        const frequency = gameState.currentFreq / 100;
        for (let x = 0; x < canvas.width; x++) {
            const y = canvas.height / 2 + Math.sin(x * 0.05 * frequency + Date.now() * 0.01) * (isTouching ? 40 : 10);
            if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
        requestAnimationFrame(render);
    }

    // --- EVENT LISTENERS ---
    document.getElementById('btnSoloFree').onclick = () => initGame('solo');
    document.getElementById('btnShowLevel').onclick = () => {
        switchScreen('level-screen');
        const grid = document.getElementById('level-grid');
        grid.innerHTML = LEVELS.map((l, i) => `<button class="mode-btn" onclick="this.dispatchEvent(new CustomEvent('sel-lvl', {detail: ${i}, bubbles:true}))">Lvl ${l.id}</button>`).join('');
    };
    document.addEventListener('sel-lvl', (e) => initGame('level', e.detail));

    document.getElementById('btnMultiplayer').onclick = () => {
        document.getElementById('multi-setup').style.display = 'block';
        const updateNames = () => {
            const count = document.getElementById('playerCount').value;
            let html = '';
            for(let i=0; i<count; i++) html += `<input type="text" class="multi-player-name" placeholder="Pemain ${i+1}" style="margin-top:5px">`;
            document.getElementById('playerNamesContainer').innerHTML = html;
        };
        document.getElementById('playerCount').onchange = updateNames;
        updateNames();
    };

    document.getElementById('btnStartBattle').onclick = () => initGame('multi');
    document.getElementById('btnStartTurn').onclick = startTurn;
    document.getElementById('btnCheck').onclick = validatePitch;
    document.getElementById('btnBackLobby').onclick = () => switchScreen('lobby');

    const handleMove = (e) => {
        if (!gameState.isPlaying) return;
        isTouching = true;
        const rect = canvas.getBoundingClientRect();
        const touchX = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
        const pct = Math.max(0, Math.min(1, touchX / rect.width));
        gameState.currentFreq = 200 + (pct * 800);
        if (oscillator) {
            oscillator.frequency.setTargetAtTime(gameState.currentFreq, audioCtx.currentTime, 0.05);
            mainGain.gain.setTargetAtTime(0.2, audioCtx.currentTime, 0.1);
        }
    };

    canvas.addEventListener('mousedown', handleMove);
    canvas.addEventListener('mousemove', (e) => isTouching && handleMove(e));
    window.addEventListener('mouseup', () => { isTouching = false; if(mainGain) mainGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1); });
    
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleMove(e); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleMove(e); });
    canvas.addEventListener('touchend', () => { isTouching = false; if(mainGain) mainGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1); });

    render();
</script>
</body>
</html>
